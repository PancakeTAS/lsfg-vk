id: org.freedesktop.Platform.VulkanLayer.lsfgvk
branch: '24.08'
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
build-extension: true

sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm20

build-options:
  prefix: /usr/lib/extensions/vulkan/lsfgvk
  prepend-path: /usr/lib/extensions/vulkan/lsfgvk/bin
  prepend-pkg-config-path: /usr/lib/extensions/vulkan/lsfgvk/share/pkgconfig
  env:
    C_INCLUDE_PATH: /usr/lib/extensions/vulkan/lsfgvk/include
    CPLUS_INCLUDE_PATH: /usr/lib/extensions/vulkan/lsfgvk/include

cleanup:
  - /bin
  - /include
  - /lib/*.a
  - /lib/*.la
  - /lib/libSDL*
  - /lib/libvulkan*
  - /lib/cmake
  - /lib/pkgconfig
  - /share/aclocal
  - /share/cmake
  - /share/doc
  - /share/licenses
  - /share/man
  - /share/pkgconfig
  - /share/vulkan/registry

modules:
  - name: lsfg-vk
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/llvm20/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm20/lib
    sources:
      - type: git
        url: https://github.com/PancakeTAS/lsfg-vk.git
        branch: develop
      - type: patch
        path: vk_layer_library_path.patch
    build-commands:
      - cmake -B build -G Ninja -DCMAKE_INSTALL_PREFIX=${FLATPAK_DEST} -DCMAKE_BUILD_TYPE=Release -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON -DCMAKE_SHARED_LINKER_FLAGS=-Wl,-z,lazy
      - ninja -C build
      - ninja -C build install

    modules:
      - name: SDL2
        buildsystem: cmake-ninja
        builddir: true
        sources:
          - type: git
            url: https://github.com/libsdl-org/SDL.git
            tag: release-2.32.8
    
      - name: vulkan-headers
        buildsystem: cmake-ninja
        builddir: true
        sources:
          - type: git
            url: https://github.com/KhronosGroup/Vulkan-Headers.git
            tag: vulkan-sdk-1.3.290
    
      - name: spirv-headers
        buildsystem: cmake-ninja
        builddir: true
        sources:
          - type: git
            url: https://github.com/KhronosGroup/Spirv-Headers.git
            tag: vulkan-sdk-1.3.290
    
      - name: vulkan-loader
        buildsystem: cmake-ninja
        builddir: true
        sources:
          - type: git
            url: https://github.com/KhronosGroup/Vulkan-Loader.git
            tag: vulkan-sdk-1.3.290
