name: Build lsfg-vk Flatpak

on:
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt update
          sudo apt install -y flatpak flatpak-builder

      - name: Add flathub remote (user scope)
        run: |
          flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo

      - name: Install Flatpak SDK/runtime (user scope)
        run: |
          flatpak --user install -y flathub org.freedesktop.Platform//24.08
          flatpak --user install -y flathub org.freedesktop.Sdk//24.08
          flatpak --user install -y org.freedesktop.Sdk.Extension.llvm20

      - name: Download Flatpak manifest
        run: |
          curl -L -o org.freedesktop.Platform.VulkanLayer.lsfgvk.yml https://raw.githubusercontent.com/PancakeTAS/lsfg-vk/refs/heads/flatpak/org.freedesktop.Platform.VulkanLayer.lsfgvk.yml
          curl -L -o vk_layer_library_path.patch https://raw.githubusercontent.com/PancakeTAS/lsfg-vk/refs/heads/flatpak/vk_layer_library_path.patch

      - name: Build Flatpak bundle
        run: |
          flatpak-builder --force-clean --user build-dir org.freedesktop.Platform.VulkanLayer.lsfgvk.yml --install-deps-from=flathub

      - name: Create Flatpak repo and bundle
        run: |
          flatpak-builder --repo=repo --force-clean --user build-dir org.freedesktop.Platform.VulkanLayer.lsfgvk.yml
          flatpak build-bundle --runtime repo org.freedesktop.Platform.VulkanLayer.lsfgvk.flatpak runtime/org.freedesktop.Platform.VulkanLayer.lsfgvk/x86_64/24.08
      
      - name: Upload Flatpak bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: lsfg-vk-flatpak
          path: org.freedesktop.Platform.VulkanLayer.lsfgvk.flatpak
