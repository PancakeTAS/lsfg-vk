{
  "id": "gay.pancake.lsfg-vk-ui",
  "runtime": "org.gnome.Platform",
  "runtime-version": "48",
  "sdk": "org.gnome.Sdk",
  "sdk-extensions": [
    "org.freedesktop.Sdk.Extension.rust-stable"
  ],
  "build-options": {
    "append-path": "/usr/lib/sdk/rust-stable/bin"
  },
  "command": "lsfg-vk-ui",
  "finish-args": [
    "--share=ipc",
    "--socket=fallback-x11",
    "--socket=wayland",
    "--device=all",
    "--filesystem=home",
    "--env=RUST_BACKTRACE=1",
    "--own-name=gay.pancake.lsfg-vk-ui"
  ],
  "modules": [
    {
      "name": "lsfg-vk-ui",
      "buildsystem": "simple",
      "build-commands": [
        "cd ui && cargo build --release --locked",
        "install -Dm755 ui/target/release/lsfg-vk-ui /app/bin/lsfg-vk-ui",
        "install -Dm644 ui/rsc/gay.pancake.lsfg-vk-ui.desktop /app/share/applications/gay.pancake.lsfg-vk-ui.desktop",
        "install -Dm644 ui/rsc/icon.png /app/share/icons/hicolor/256x256/apps/gay.pancake.lsfg-vk-ui.png"
      ],
      "build-options": {
        "env": {
          "CARGO_HOME": "/run/build/lsfg-vk-ui/cargo",
          "RUSTUP_HOME": "/run/build/lsfg-vk-ui/rustup"
        },
        "build-args": [
          "--share=network"
        ]
      },
      "sources": [
        {
          "type": "git",
          "url": "https://github.com/Twig6943/lsfg-vk",
          "branch": "develop"
        }
      ]
    }
  ]
}
